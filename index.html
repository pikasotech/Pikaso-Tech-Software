<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>PIKASO TECH</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{
  background:linear-gradient(160deg,#12001f 0%,#2a005a 45%,#5a0040 75%,#ff2d78 100%);
  min-height:100vh;
  font-family:'Nunito',sans-serif;
  color:#fff;
  overflow-x:hidden;
}

/* ── LOGIN ── */
#loginScreen, #signupScreen{
  position:fixed;inset:0;z-index:999;
  background:linear-gradient(160deg,#0a0015,#1e0040,#3a0030);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;overflow-y:auto;
}
.login-logo-box{
  width:90px;height:90px;border-radius:24px;
  background:linear-gradient(135deg,#ff2d78,#7c3aed);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;
  box-shadow:0 0 40px rgba(255,45,120,0.5);
  font-size:40px;
}
.login-brand{
  font-family:'Orbitron',monospace;font-size:26px;font-weight:900;
  background:linear-gradient(90deg,#ff2d78,#c084fc,#ff2d78);
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:shimmer 3s infinite linear;
  text-align:center;
}
.login-sub{font-size:11px;letter-spacing:5px;color:rgba(255,255,255,0.35);margin-bottom:36px;}
.login-card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,45,120,0.3);
  border-radius:20px;padding:26px 22px;width:100%;max-width:340px;
}
.login-label{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:8px;display:block;}
.login-input{
  width:100%;padding:15px 18px;
  background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(255,45,120,0.25);
  border-radius:12px;color:#fff;font-size:16px;
  font-family:'Nunito',sans-serif;outline:none;margin-bottom:14px;
}
.login-input:focus{border-color:#ff2d78;}
.login-btn{
  width:100%;padding:15px;
  background:linear-gradient(90deg,#ff2d78,#7c3aed);
  border:none;border-radius:12px;color:#fff;
  font-size:16px;font-weight:800;
  font-family:'Orbitron',monospace;letter-spacing:2px;cursor:pointer;
}
.login-err{color:#ff2d78;font-size:13px;text-align:center;margin-top:10px;display:none;}

/* ── APP ── */
#app{display:none;min-height:100vh;}

/* ── BIG COVER HEADER ── */
.cover{
  width:100%;
  background:linear-gradient(135deg,#1a0035 0%,#3d0070 40%,#7c3aed 70%,#ff2d78 100%);
  padding:28px 20px 22px;
  position:relative;overflow:hidden;
}
.cover::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 80% 50%,rgba(255,45,120,0.3),transparent 65%),
             radial-gradient(ellipse at 20% 80%,rgba(124,58,237,0.3),transparent 65%);
}
.cover-top{position:relative;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cover-logo{display:flex;align-items:center;gap:12px;}
.cover-icon{
  width:52px;height:52px;border-radius:14px;
  background:rgba(255,255,255,0.15);
  border:1.5px solid rgba(255,255,255,0.25);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;
}
.cover-title{
  font-family:'Orbitron',monospace;font-size:22px;font-weight:900;
  color:#fff;line-height:1;
  text-shadow:0 2px 20px rgba(255,45,120,0.5);
}
.cover-title span{
  display:block;font-size:9px;letter-spacing:5px;font-weight:400;
  color:rgba(255,255,255,0.6);margin-top:4px;
}
.lock-btn{
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:10px;padding:8px 14px;
  color:#fff;font-size:13px;font-weight:700;cursor:pointer;
}
.cover-stats{
  position:relative;
  display:flex;gap:12px;
}
.stat-pill{
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:20px;padding:6px 14px;
  font-size:12px;font-weight:700;color:rgba(255,255,255,0.8);
  display:flex;align-items:center;gap:5px;
}
.stat-pill b{color:#fff;font-size:14px;}

/* ── MAIN LAYOUT ── */
.main-layout{display:flex;min-height:calc(100vh - 140px);}

/* ── LEFT SIDEBAR FOLDERS ── */
.sidebar{
  width:110px;min-width:110px;
  background:rgba(0,0,0,0.35);
  border-right:1px solid rgba(255,45,120,0.15);
  padding:14px 8px;
  display:flex;flex-direction:column;gap:8px;
  overflow-y:auto;
}
.sidebar-label{
  font-size:9px;letter-spacing:3px;
  color:rgba(255,255,255,0.25);
  text-align:center;padding:0 4px;margin-bottom:4px;
}
.folder-btn{
  display:flex;flex-direction:column;align-items:center;
  gap:5px;padding:10px 6px;border-radius:14px;
  border:1.5px solid rgba(255,45,120,0.15);
  background:rgba(255,255,255,0.04);
  cursor:pointer;transition:all 0.2s;position:relative;
}
.folder-btn.active{
  background:linear-gradient(135deg,rgba(255,45,120,0.25),rgba(124,58,237,0.25));
  border-color:rgba(255,45,120,0.6);
  box-shadow:0 0 14px rgba(255,45,120,0.2);
}
.folder-btn:active{transform:scale(0.96);}
.f-icon{font-size:26px;line-height:1;}
.f-name{
  font-size:10px;font-weight:700;text-align:center;
  color:rgba(255,255,255,0.7);line-height:1.2;word-break:break-word;
}
.folder-btn.active .f-name{color:#fff;}
.f-count{
  position:absolute;top:6px;right:6px;
  background:linear-gradient(90deg,#ff2d78,#7c3aed);
  border-radius:20px;padding:1px 5px;
  font-size:9px;font-weight:800;color:#fff;
}
.add-folder-btn{
  display:flex;flex-direction:column;align-items:center;
  gap:4px;padding:10px 6px;border-radius:14px;
  border:1.5px dashed rgba(255,45,120,0.3);
  background:transparent;color:rgba(255,255,255,0.35);
  cursor:pointer;font-size:11px;font-weight:700;
  font-family:'Nunito',sans-serif;
}
.add-folder-btn span{font-size:20px;}

/* ── CONTENT ── */
.content{flex:1;padding:14px 12px;overflow-y:auto;}
.content-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
}
.content-title{
  font-family:'Orbitron',monospace;font-size:13px;font-weight:700;
  color:#fff;
}
.add-sw-btn{
  background:linear-gradient(90deg,#ff2d78,#7c3aed);
  border:none;border-radius:10px;padding:9px 14px;
  color:#fff;font-size:12px;font-weight:800;
  font-family:'Nunito',sans-serif;cursor:pointer;
}

/* SOFTWARE GRID */
.sw-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:10px;
}
.sw-card{
  background:rgba(255,255,255,0.06);
  border:1.5px solid rgba(255,45,120,0.18);
  border-radius:16px;padding:14px 10px 12px;
  display:flex;flex-direction:column;align-items:center;
  gap:6px;position:relative;animation:fadeUp 0.3s ease;
}
.sw-icon-box{
  width:50px;height:50px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;
  background:linear-gradient(135deg,rgba(255,45,120,0.15),rgba(124,58,237,0.15));
  border:1px solid rgba(255,45,120,0.2);
}
.sw-name{font-size:12px;font-weight:800;text-align:center;color:#fff;line-height:1.2;}
.sw-dl{
  width:100%;padding:8px;
  background:linear-gradient(90deg,#ff2d78,#7c3aed);
  border:none;border-radius:8px;color:#fff;
  font-size:11px;font-weight:800;
  font-family:'Nunito',sans-serif;cursor:pointer;margin-top:2px;
}
.sw-del{
  position:absolute;top:8px;right:8px;
  width:20px;height:20px;border-radius:5px;
  background:rgba(255,45,120,0.2);border:none;
  color:#ff2d78;font-size:11px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}

/* EMPTY */
.empty{
  grid-column:1/-1;text-align:center;
  padding:40px 16px;color:rgba(255,255,255,0.3);
}
.empty-icon{font-size:44px;margin-bottom:10px;}
.empty p{font-size:13px;line-height:1.6;}

/* ── MODALS ── */
.overlay{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);
  display:flex;align-items:flex-end;justify-content:center;
  animation:fadeIn 0.2s;
}
.modal{
  background:linear-gradient(160deg,#1a0030,#2d0050);
  border:1px solid rgba(255,45,120,0.35);
  border-radius:24px 24px 0 0;
  padding:24px 20px 36px;width:100%;max-width:480px;
  animation:slideUp 0.3s ease;max-height:90vh;overflow-y:auto;
}
.modal h3{
  font-family:'Orbitron',monospace;font-size:14px;
  background:linear-gradient(90deg,#ff2d78,#c084fc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:18px;
}
.modal input,.modal select{
  width:100%;padding:13px 15px;
  background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(255,45,120,0.25);
  border-radius:11px;color:#fff;font-size:15px;
  font-family:'Nunito',sans-serif;outline:none;margin-bottom:11px;
}
.modal select option{background:#1a0030;}
.modal input:focus,.modal select:focus{border-color:#ff2d78;}
.icon-section-label{font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:10px;}
.icon-grid{
  display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-bottom:16px;
}
.icon-opt{
  aspect-ratio:1;border-radius:10px;
  background:rgba(255,255,255,0.06);
  border:1.5px solid transparent;font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.icon-opt.sel{border-color:#ff2d78;background:rgba(255,45,120,0.2);}
.modal-btns{display:flex;gap:10px;}
.modal-btns button{
  flex:1;padding:13px;border-radius:11px;
  font-size:14px;font-weight:800;
  font-family:'Nunito',sans-serif;cursor:pointer;
}
.btn-ok{background:linear-gradient(90deg,#ff2d78,#7c3aed);border:none;color:#fff;}
.btn-no{background:transparent;border:1.5px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.4);}

/* DELETE FOLDER BTN in sidebar */
.del-folder{
  margin-top:2px;
  background:rgba(255,45,120,0.1);border:none;
  color:rgba(255,45,120,0.6);font-size:9px;
  border-radius:5px;padding:2px 6px;cursor:pointer;
  font-family:'Nunito',sans-serif;font-weight:700;
}

@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- SIGNUP SCREEN -->
<div id="signupScreen" style="display:none">
  <div class="login-logo-box">&#128187;</div>
  <div class="login-brand">PIKASO TECH</div>
  <div class="login-sub">CREATE YOUR ACCOUNT</div>
  <div class="login-card">
    <label class="login-label">Your Name</label>
    <input class="login-input" type="text" id="suName" placeholder="e.g. Ali Hassan"/>
    <label class="login-label">Email Address</label>
    <input class="login-input" type="email" id="suEmail" placeholder="e.g. ali@gmail.com"/>
    <label class="login-label">Set Password</label>
    <input class="login-input" type="password" id="suPass" placeholder="Create a password"/>
    <button class="login-btn" onclick="doSignup()">CREATE ACCOUNT</button>
    <div class="login-err" id="suErr"></div>
  </div>
</div>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-logo-box">&#128187;</div>
  <div class="login-brand">PIKASO TECH</div>
  <div class="login-sub">SOFTWARE LIBRARY</div>
  <div class="login-card">
    <div id="welcomeMsg" style="font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:14px;text-align:center;"></div>
    <label class="login-label">Email Address</label>
    <input class="login-input" type="email" id="pwEmail" placeholder="Your email..."/>
    <label class="login-label">Password</label>
    <input class="login-input" type="password" id="pwIn" placeholder="Your password..." onkeydown="if(event.key==='Enter')login()"/>
    <button class="login-btn" onclick="login()">UNLOCK</button>
    <div class="login-err" id="loginErr">&#10060; Wrong email or password!</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- BIG COVER -->
  <div class="cover">
    <div class="cover-top">
      <div class="cover-logo">
        <div class="cover-icon">&#128187;</div>
        <div class="cover-title">
          PIKASO TECH
          <span>SOFTWARE LIBRARY</span>
        </div>
      </div>
      <button class="lock-btn" onclick="logout()">&#128274; Lock</button>
    </div>
    <div class="cover-stats">
      <div class="stat-pill">&#128193; Folders: <b id="statFolders">0</b></div>
      <div class="stat-pill">&#128190; Software: <b id="statSw">0</b></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-layout">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-label">FOLDERS</div>
      <div id="sidebarFolders"></div>
      <button class="add-folder-btn" onclick="openAddFolder()">
        <span>&#43;</span>New
      </button>
    </div>

    <!-- CONTENT -->
    <div class="content">
      <div class="content-header">
        <div class="content-title" id="contentTitle">Select Folder</div>
        <button class="add-sw-btn" onclick="openAddSw()">&#43; Add</button>
      </div>
      <div class="sw-grid" id="swGrid"></div>
    </div>
  </div>
</div>

<!-- ADD SOFTWARE MODAL -->
<div class="overlay" id="swModal" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal">
    <h3>&#128190; ADD SOFTWARE</h3>
    <input type="text" id="swName" placeholder="Software name (e.g. WinRAR)"/>
    <input type="text" id="swLink" placeholder="Download link (https://...)"/>
    <select id="swFolderSel"></select>
    <div class="icon-section-label">&#127381; Choose Icon:</div>
    <div class="icon-grid" id="swIconGrid"></div>
    <div class="modal-btns">
      <button class="btn-no" onclick="closeM('swModal')">Cancel</button>
      <button class="btn-ok" onclick="addSw()">Add &#10003;</button>
    </div>
  </div>
</div>

<!-- ADD FOLDER MODAL -->
<div class="overlay" id="folderModal" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal">
    <h3>&#128193; NEW FOLDER</h3>
    <input type="text" id="folderNameIn" placeholder="Folder name (e.g. Activators)"/>
    <div class="icon-section-label">&#127381; Choose Icon:</div>
    <div class="icon-grid" id="folderIconGrid"></div>
    <div class="modal-btns">
      <button class="btn-no" onclick="closeM('folderModal')">Cancel</button>
      <button class="btn-ok" onclick="addFolder()">Create &#10003;</button>
    </div>
  </div>
</div>

<script>
const PASS = "pikaso123";

const SW_ICONS = [
  "&#128187;","&#128190;","&#128191;","&#128192;","&#128193;","&#128196;",
  "&#9881;","&#128295;","&#128296;","&#128300;","&#128241;","&#127760;",
  "&#127911;","&#127918;","&#128247;","&#128421;","&#128737;","&#128273;",
  "&#128274;","&#128197;","&#128200;","&#128202;","&#127775;","&#128640;"
];
const FOLDER_ICONS = [
  "&#128193;","&#128194;","&#128218;","&#127918;","&#127911;","&#128737;",
  "&#128295;","&#127760;","&#128241;","&#9881;","&#128187;","&#128300;",
  "&#128273;","&#128640;","&#127775;","&#128204;","&#128205;","&#128176;"
];

let state = {
  folders:[],
  software:[],
  activeFolder:null,
  selSwIcon: SW_ICONS[0],
  selFolderIcon: FOLDER_ICONS[0],
};

// ── AUTH ──
function initAuth(){
  const user = localStorage.getItem("pt_user");
  if(!user){
    // First time — show signup
    document.getElementById("signupScreen").style.display="flex";
    document.getElementById("loginScreen").style.display="none";
  } else {
    const u = JSON.parse(user);
    document.getElementById("welcomeMsg").textContent="Welcome back, "+u.name+"!";
    document.getElementById("signupScreen").style.display="none";
    document.getElementById("loginScreen").style.display="flex";
  }
}

function doSignup(){
  const name = document.getElementById("suName").value.trim();
  const email = document.getElementById("suEmail").value.trim();
  const pass = document.getElementById("suPass").value;
  const err = document.getElementById("suErr");
  if(!name){err.style.display="block";err.textContent="&#10060; Name likho!";return;}
  if(!email||!email.includes("@")){err.style.display="block";err.textContent="&#10060; Sahi email likho!";return;}
  if(pass.length<4){err.style.display="block";err.textContent="&#10060; Password kam se kam 4 characters ka ho!";return;}
  // Save user
  localStorage.setItem("pt_user", JSON.stringify({name,email,pass}));
  // Go to app
  document.getElementById("signupScreen").style.display="none";
  document.getElementById("app").style.display="block";
  render();
}

function login(){
  const email = document.getElementById("pwEmail").value.trim();
  const pass = document.getElementById("pwIn").value;
  const stored = localStorage.getItem("pt_user");
  if(!stored){initAuth();return;}
  const u = JSON.parse(stored);
  if(email===u.email && pass===u.pass){
    document.getElementById("loginScreen").style.display="none";
    document.getElementById("app").style.display="block";
    render();
  } else {
    document.getElementById("loginErr").style.display="block";
    document.getElementById("pwIn").value="";
  }
}

function logout(){
  document.getElementById("loginScreen").style.display="flex";
  document.getElementById("app").style.display="none";
  document.getElementById("pwIn").value="";
  document.getElementById("pwEmail").value="";
  document.getElementById("loginErr").style.display="none";
  const stored = localStorage.getItem("pt_user");
  if(stored){
    const u=JSON.parse(stored);
    document.getElementById("welcomeMsg").textContent="Welcome back, "+u.name+"!";
  }
}

// Start
initAuth();

function render(){
  renderSidebar();
  renderContent();
  updateStats();
}

function updateStats(){
  document.getElementById("statFolders").textContent=state.folders.length;
  document.getElementById("statSw").textContent=state.software.length;
}

function renderSidebar(){
  const cont = document.getElementById("sidebarFolders");
  if(state.folders.length===0){cont.innerHTML="";return;}
  cont.innerHTML = state.folders.map(f=>{
    const cnt = state.software.filter(s=>s.folder===f.id).length;
    return `<div class="folder-btn ${state.activeFolder===f.id?'active':''}" onclick="setFolder('${f.id}')">
      ${cnt>0?`<span class="f-count">${cnt}</span>`:""}
      <span class="f-icon">${f.icon}</span>
      <span class="f-name">${f.name}</span>
      <button class="del-folder" onclick="event.stopPropagation();delFolder('${f.id}')">Del</button>
    </div>`;
  }).join("");
}

function renderContent(){
  const grid = document.getElementById("swGrid");
  const title = document.getElementById("contentTitle");

  if(state.folders.length===0){
    title.textContent="My Library";
    grid.innerHTML=`<div class="empty">
      <div class="empty-icon">&#128193;</div>
      <p>No folders yet!<br>Tap <b>New</b> on left<br>to create a folder.</p>
    </div>`;
    return;
  }
  if(!state.activeFolder) state.activeFolder=state.folders[0].id;
  const f = state.folders.find(x=>x.id===state.activeFolder);
  title.textContent = f ? f.icon+" "+f.name : "";

  const list = state.software.filter(s=>s.folder===state.activeFolder);
  if(!list.length){
    grid.innerHTML=`<div class="empty">
      <div class="empty-icon">&#128190;</div>
      <p>No software here.<br>Tap <b>+ Add</b> to add.</p>
    </div>`;
    return;
  }
  grid.innerHTML=list.map(sw=>`
    <div class="sw-card">
      <button class="sw-del" onclick="delSw(${sw.id})">&#10005;</button>
      <div class="sw-icon-box">${sw.icon}</div>
      <div class="sw-name">${sw.name}</div>
      <button class="sw-dl" onclick="window.open('${sw.link}','_blank')">&#11015; Download</button>
    </div>
  `).join("");
}

function setFolder(id){state.activeFolder=id;render();}

function delFolder(id){
  if(confirm("Delete this folder and its software?")){
    state.folders=state.folders.filter(f=>f.id!==id);
    state.software=state.software.filter(s=>s.folder!==id);
    if(state.activeFolder===id) state.activeFolder=state.folders[0]?.id||null;
    render();
  }
}

function delSw(id){
  if(confirm("Remove this software?")){
    state.software=state.software.filter(s=>s.id!==id);
    render();
  }
}

function openAddSw(){
  if(state.folders.length===0){alert("Pehle ek folder banao!");return;}
  const sel=document.getElementById("swFolderSel");
  sel.innerHTML=state.folders.map(f=>`<option value="${f.id}">${f.name}</option>`).join("");
  if(state.activeFolder) sel.value=state.activeFolder;
  state.selSwIcon=SW_ICONS[0];
  document.getElementById("swIconGrid").innerHTML=SW_ICONS.map((ic,i)=>
    `<div class="icon-opt ${i===0?'sel':''}" onclick="pickSwIcon(this,'${ic}')">${ic}</div>`
  ).join("");
  document.getElementById("swName").value="";
  document.getElementById("swLink").value="";
  document.getElementById("swModal").style.display="flex";
}

function pickSwIcon(el,ic){
  state.selSwIcon=ic;
  document.querySelectorAll("#swIconGrid .icon-opt").forEach(x=>x.classList.remove("sel"));
  el.classList.add("sel");
}

function addSw(){
  const name=document.getElementById("swName").value.trim();
  const link=document.getElementById("swLink").value.trim();
  const folder=document.getElementById("swFolderSel").value;
  if(!name||!link){alert("Name aur link dono fill karo!");return;}
  state.software.push({id:Date.now(),name,link,folder,icon:state.selSwIcon});
  closeM("swModal");render();
}

function openAddFolder(){
  state.selFolderIcon=FOLDER_ICONS[0];
  document.getElementById("folderIconGrid").innerHTML=FOLDER_ICONS.map((ic,i)=>
    `<div class="icon-opt ${i===0?'sel':''}" onclick="pickFolderIcon(this,'${ic}')">${ic}</div>`
  ).join("");
  document.getElementById("folderNameIn").value="";
  document.getElementById("folderModal").style.display="flex";
}

function pickFolderIcon(el,ic){
  state.selFolderIcon=ic;
  document.querySelectorAll("#folderIconGrid .icon-opt").forEach(x=>x.classList.remove("sel"));
  el.classList.add("sel");
}

function addFolder(){
  const name=document.getElementById("folderNameIn").value.trim();
  if(!name){alert("Folder ka naam likho!");return;}
  const id="f"+Date.now();
  state.folders.push({id,name,icon:state.selFolderIcon});
  if(!state.activeFolder) state.activeFolder=id;
  closeM("folderModal");render();
}

function closeM(id){document.getElementById(id).style.display="none";}
</script>
</body>
</html>
